<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COMP3041J Quiz 复习</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --surface: #ffffff;
      --surface-2: #eef3f4;
      --ink: #172026;
      --muted: #5c6870;
      --line: #d7dee0;
      --primary: #135e6f;
      --primary-2: #0b4653;
      --accent: #b8572d;
      --ok: #1f7a4d;
      --bad: #b23a3a;
      --shadow: 0 10px 28px rgba(23, 32, 38, 0.08);
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    label:focus-within {
      outline: 3px solid rgba(19, 94, 111, 0.24);
      outline-offset: 2px;
    }

    .app-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(246, 247, 242, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      max-width: 1680px;
      margin: 0 auto;
      padding: 14px 20px 12px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tab-button,
    .utility-button,
    .answer-button {
      min-height: 44px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      border-radius: 8px;
      padding: 0 14px;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .tab-button:hover,
    .utility-button:hover,
    .answer-button:hover {
      border-color: #9fb5bb;
      transform: translateY(-1px);
    }

    .tab-button[aria-selected="true"] {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .workspace {
      flex: 1;
      width: 100%;
      max-width: 1680px;
      margin: 0 auto;
      padding: 18px 20px 20px;
      min-height: 0;
    }

    .split-view {
      display: grid;
      grid-template-columns: minmax(360px, 0.92fr) minmax(460px, 1.08fr);
      gap: 16px;
      height: calc(100dvh - 96px);
      min-height: 640px;
    }

    .pane {
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pane-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      background: #fbfcfa;
    }

    .pane-header.is-located {
      animation: locatePulse 900ms ease;
    }

    @keyframes locatePulse {
      0% {
        background: #fff1df;
      }

      100% {
        background: #fbfcfa;
      }
    }

    .pane-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .pane-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .paper-actions,
    .question-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      min-height: 38px;
      font-size: 13px;
      padding: 0 11px;
      white-space: nowrap;
    }

    .utility-button.is-active {
      color: #fff;
      border-color: var(--primary);
      background: var(--primary);
    }

    .scroll-region {
      overflow: auto;
      min-height: 0;
      flex: 1;
    }

    .question-list {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .question-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }

    .question-card.is-correct {
      border-color: rgba(31, 122, 77, 0.42);
    }

    .question-card.is-wrong {
      border-color: rgba(178, 58, 58, 0.42);
    }

    .question-main {
      padding: 15px;
    }

    .question-kicker {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status-pill.correct {
      color: var(--ok);
      background: #e8f4ed;
      border-color: #c8e3d5;
    }

    .status-pill.wrong {
      color: var(--bad);
      background: #f7eaea;
      border-color: #e9c8c8;
    }

    .question-text {
      margin: 0 0 12px;
      font-size: 16px;
      line-height: 1.55;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 8px;
      margin: 0 0 14px;
      padding: 0;
      border: 0;
    }

    .option {
      min-height: 44px;
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      color: var(--ink);
    }

    .option:hover {
      border-color: #9fb5bb;
    }

    .option input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: var(--primary);
    }

    .option-text {
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .option.correct-choice {
      border-color: rgba(31, 122, 77, 0.55);
      background: #edf8f1;
    }

    .option.wrong-choice {
      border-color: rgba(178, 58, 58, 0.5);
      background: #fbefef;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .answer-button {
      min-height: 40px;
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      font-weight: 700;
    }

    .answer-button.secondary {
      background: var(--surface);
      color: var(--primary-2);
      border-color: #b6cbd0;
    }

    .feedback {
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .explanation {
      border-top: 1px solid var(--line);
      background: #fcfbf7;
      padding: 14px 15px 15px;
      display: none;
    }

    .explanation.is-open {
      display: block;
    }

    .answer-line {
      margin: 0 0 10px;
      font-weight: 800;
      color: var(--primary-2);
    }

    .explanation p {
      margin: 0 0 10px;
      line-height: 1.65;
    }

    .source-box {
      border-left: 4px solid var(--accent);
      background: #fff7f0;
      padding: 10px 12px;
      line-height: 1.55;
      color: #533622;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    .paper-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--surface-2);
    }

    .paper-fallback {
      padding: 14px 16px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--line);
      background: #fbfcfa;
    }

    .paper-fallback a {
      color: var(--primary-2);
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .topbar-inner {
        grid-template-columns: 1fr;
      }

      .tabs {
        justify-content: flex-start;
      }

      .split-view {
        height: auto;
        min-height: 0;
        grid-template-columns: 1fr;
      }

      .pane {
        min-height: 560px;
      }

      .paper-pane {
        min-height: 680px;
      }
    }

    @media (max-width: 560px) {
      .topbar-inner,
      .workspace {
        padding-left: 12px;
        padding-right: 12px;
      }

      .pane-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .paper-actions,
      .question-tools {
        justify-content: flex-start;
      }

      .tab-button {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1>COMP3041J Quiz 复习工作台</h1>
          <div class="subtitle">左侧作答与解析，右侧独立查阅论文；答案会自动保存在当前浏览器。</div>
        </div>
        <nav class="tabs" aria-label="Quiz tabs" id="tabs"></nav>
      </div>
    </header>

    <main class="workspace">
      <section class="split-view" aria-live="polite">
        <article class="pane">
          <div class="pane-header">
            <div>
              <h2 class="pane-title" id="quizTitle"></h2>
              <div class="pane-meta" id="quizMeta"></div>
            </div>
            <div class="question-tools">
              <button class="utility-button" type="button" id="toggleUnanswered">只看未答</button>
              <button class="utility-button" type="button" id="toggleAllExplanations">展开解析</button>
              <button class="utility-button" type="button" id="resetQuiz">重置本页</button>
            </div>
          </div>
          <div class="scroll-region">
            <div class="question-list" id="questionList"></div>
          </div>
        </article>

        <aside class="pane paper-pane" id="paperPane">
          <div class="pane-header" id="paperHeader">
            <div>
              <h2 class="pane-title" id="paperTitle"></h2>
              <div class="pane-meta" id="paperMeta"></div>
            </div>
            <div class="paper-actions">
              <button class="utility-button" type="button" id="openPaper">打开 PDF</button>
            </div>
          </div>
          <div class="scroll-region" id="paperHolder">
            <iframe class="paper-frame" id="paperFrame" title="Paper PDF"></iframe>
          </div>
          <div class="paper-fallback">
            如果浏览器没有内置 PDF 预览，可用上方按钮打开论文文件。
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script>
    const quizzes = [
      {
        id: "quiz1",
        title: "Quiz 1: Serverless Cold Starts",
        paperTitle: "Fork in the Road: Reflections and Optimizations for Cold Start Latency in Production Serverless Systems",
        paperFile: "Fork%20in%20the%20Road-%20Reflections%20and%20Optimizations%20for%20Cold%20Starts.pdf",
        paperMeta: "OSDI 2025 · Ant Group AFaaS · 冷启动、控制路径、资源争用、用户代码初始化",
        questions: [
          q("What does the paper suggest about hot-start caching as a practical solution?", ["It completely removes the cold-start problem in production", "It matters only when functions are written in Python", "It works only in open-source frameworks, not commercial systems", "It helps, but is insufficient on its own because many functions are too infrequent to justify broad caching", "It is useful only for stateful serverless platforms"], "D", "热启动缓存确实能让高频函数更快，因为平台保留已启动实例供后续请求复用。但论文的关键结论是：请求热度高度不均，缓存主要服务少数高频函数；大量低频函数不值得长期保留实例，否则内存成本太高，所以仍必须优化冷启动本身。", "§2.1 Implication-2 指出 hot start 能显著提升 FaaS 性能，但缓存低频函数会消耗过多内存；Ant Group 只短时间保留热实例，且超过 60% 的函数冷启动比热启动更常见。", 4),
          q("What does the paper show about the relationship between serverless abstraction and platform internals?", ["A simpler developer interface does not eliminate the provider's internal runtime and orchestration complexity", "Hiding infrastructure from developers removes most performance concerns", "Once infrastructure is abstracted, control-path design becomes unimportant", "Serverless platforms eliminate orchestration overhead by design", "Runtime engineering matters less in serverless than in containers"], "A", "Serverless 对开发者隐藏了服务器，但没有让服务器消失。论文反复展示平台内部仍要做调度、网关转发、容器运行时交互、sandbox fork、网络和安全规则安装等工作；这些内部路径做不好，用户仍会感知到延迟。", "§1 Introduction 说明 serverless 抽象掉基础设施管理，但平台仍负责资源分配、伸缩和成本优化；Figure 1 和 §2.2 展示了冷启动背后的网关、调度器、运行时和容器初始化链路。", 2),
          q("According to the paper, what is a more accurate way to understand cold-start latency?", ["It is relevant only when functions are stateful", "It is mainly a billing-side effect of serverless pricing", "It disappears once warm starts are supported", "It is simply the time needed to create a container", "It involves multiple interacting stages, including control-path work, container initialization, and user-code initialization"], "E", "冷启动不是一个单点动作，而是一条端到端链路。即使 container fork 很快，仍可能被控制路径 RPC、运行时 shim、网络栈、安全规则、语言运行时、依赖加载和用户代码初始化拖慢。", "Figure 6 和 §2.2 把 E2E cold start 分成三段：Control-path Interaction、Container Initialization、User Code Execution，并列出 InitCode 等阶段的耗时。", 5),
          q("Which type of serverless workload is most likely to be strongly affected by the issues analyzed in the paper?", ["A VM snapshot task in IaaS", "A database backup performed overnight", "A very long batch job where startup is negligible compared with total runtime", "A monolithic application on a dedicated server", "A short interactive request where response delay is visible to the user"], "E", "短交互请求对启动延迟最敏感，因为用户等待的是总响应时间。如果函数本身只运行几十毫秒，几百毫秒到数秒的冷启动会成为主要体验问题；长批处理则会把启动开销摊薄。", "§1 Introduction 提到很多 serverless 函数只执行 50-100ms，而冷启动可能超过 1 秒，因此启动延迟成为用户可见的性能瓶颈。", 2),
          q("Based on the paper, which workload characteristic makes startup overhead especially important?", ["The workload is written in a high-level language", "The workload uses containers instead of VMs", "The workload uses a relational database", "The workload is deployed across multiple cloud regions", "The workload executes in very short bursts and does little useful work per invocation"], "E", "关键不是语言或数据库，而是 invocation 很短。真正有用的计算很少时，启动、加载依赖和平台编排就会占据响应时间的大头，优化启动才有意义。", "§1 指出 serverless functions often execute within just 50-100ms；§2.1 Figure 5 也用生产数据说明大量请求用户代码执行时间很短。", 2),
          q("Why does the paper emphasize resource contention latency under concurrency?", ["Because contention occurs only in stateful functions", "Because simplified serial evaluations can miss bottlenecks that appear under real concurrent workloads", "Because concurrency reduces startup latency to zero", "Because high concurrency affects billing but not latency", "Because concurrent serverless execution avoids shared infrastructure"], "B", "很多优化在单请求、串行测试里看起来很好，但生产系统会同时启动大量实例。并发会让内核锁、namespace、seccomp、网络资源等共享路径出现争用，导致尾延迟和波动，这正是单机串行实验容易漏掉的。", "Abstract 提到 prior work 对 concurrent execution environments 关注不足；Figure 3 和 §2.2 Gap-2 展示高并发下 tail latency 增大、性能下降来自 host OS resource contention。", 3),
          q("What broader lesson about serverless platforms is supported by the paper?", ["Even when developers do not manage servers directly, the platform must still solve difficult runtime and orchestration problems efficiently", "Serverless platforms avoid most internal coordination overhead by design", "Once infrastructure is abstracted away, platform performance engineering becomes unimportant", "Serverless shifts most system-level complexity back to the application developer", "Operational abstraction eliminates the need for low-level runtime design"], "A", "Serverless 把复杂性从应用开发者移到了平台提供者。论文的 AFaaS 设计正是在平台内部重做控制路径、资源池化和 seed 结构，说明抽象层越简单，底层工程反而越要可靠高效。", "Abstract 和 §3 AFaaS Overview 说明 AFaaS 针对控制路径、资源争用、用户代码初始化分别设计 FRI、资源池化/共享、多级 seed。", 8),
          q("According to the paper, why is control-path latency an important serverless issue?", ["Because it affects only warm starts", "Because it proves that billing systems dominate response time", "Because it means user code no longer matters in startup", "Because it occurs only in VM-based serverless systems", "Because it shows that startup delay can arise from interactions between runtime components, not only from creating the execution environment"], "E", "控制路径强调的是启动请求如何在平台组件间流转。即使创建 sandbox 本身已经被优化，containerd、shim、runtime binary call、RPC 等交互仍会造成明显开销，所以不能只盯着执行环境创建。", "Figure 2 展示 control-path costs；§2.2 Gap-1 解释高层运行时与低层运行时之间的 shim+engine 调用链会引入 18-25ms 级别延迟。", 5),
          q("Why is the paper’s focus on end-to-end latency especially important for understanding serverless systems?", ["Because startup latency matters only before logging begins", "Because end-to-end latency depends only on user code execution", "Because end-to-end latency is a concern only for surveys, not production systems", "Because users mainly care about the total delay they experience, not just one isolated initialization phase", "Because platform behavior does not affect user-perceived latency"], "D", "论文批评只优化单个阶段的研究，因为用户感知的是从扩容请求、加载代码、执行函数到返回响应的完整时间。某一段很快不代表整体快，端到端视角才能发现瓶颈转移。", "§2.2 明确定义 E2E latency 是从节点收到扩容请求到响应返回给最终用户的完整过程，并说这是 customer perspective 的关键指标。", 5),
          q("How does this paper help students understand why serverless is not just “containers on demand”?", ["It shows that containers are never used in serverless platforms", "It shows that containers and serverless have identical performance behavior", "It shows that serverless startup behavior includes platform control paths, orchestration, and user-code initialization in addition to execution environments", "It proves that serverless platforms always use bare-metal execution", "It argues that serverless functions cannot be event-driven"], "C", "“按需容器”只说中了执行环境的一部分。serverless 启动还包括调度、网关、运行时接口、控制路径、安全隔离、网络准备、依赖加载和用户代码初始化；这些共同决定请求体验。", "Figure 1 展示 invoke、scheduler、node gateway、container runtime、user code initialize 等组件；Figure 6 把冷启动拆成控制路径、容器初始化和用户代码执行三段。", 2),
          q("What is the paper’s main criticism of many earlier cold-start optimizations?", ["They were designed only for edge computing", "They assumed serverless functions should always be stateful", "They ignored all security issues in cloud computing", "They focused too heavily on user-code frameworks rather than containers", "They optimized isolated parts of startup without fully addressing end-to-end latency in production systems"], "E", "论文认为很多工作有效但视野太窄：要么假设过于简化，要么只优化 fork、snapshot 或某个初始化阶段，缺少生产环境的端到端链路和高并发压力分析。", "Abstract 总结 prior research 的三类局限：依赖简化假设、只优化 isolated components、对 concurrent execution challenges 关注不足。", 2),
          q("Why does the paper treat cold start latency as a major problem in serverless computing?", ["Because all serverless functions are long-running", "Because cold starts happen only when functions fail", "Because startup delay can be large relative to the short execution time of many functions", "Because billing is always dominated by startup cost", "Because serverless platforms do not support warm starts"], "C", "serverless 的优势是按需、短小、弹性，但这也使启动成本更显眼。函数执行可能只有几十毫秒，冷启动却可能几百毫秒到数秒，比例上非常大。", "§1 Introduction 直接把 cold start latency 描述为 persistent challenge：无预热实例时要初始化新实例，常超过 1 秒，而函数常只运行 50-100ms。", 2),
          q("Why does the paper identify user code initialization latency as a separate problem?", ["Because loading runtimes, frameworks, and dependencies can add substantial delay before useful work begins", "Because user code begins only after the response is returned", "Because it is relevant only to compiled languages", "Because it replaces the need for container initialization", "Because it occurs only in public cloud systems"], "A", "容器准备好不等于业务逻辑马上开始。语言运行时、框架、依赖库、JIT 或代码加载都可能在真正执行函数前消耗大量时间，因此论文把 InitCode 单独列为瓶颈。", "Figure 6 的 InitCode 阶段说明 sandbox 会加载语言运行时、编译用户代码、加载依赖框架和库；§2.2 提到 Node.js 示例中依赖初始化占了大量时间。", 5),
          q("A student says: “Cold-start latency is basically the time needed to create a container.” Based on the paper, what is the best response?", ["Mostly correct — the only extra cost is billing overhead", "Incorrect — cold-start latency applies only to storage-bound functions", "Correct — startup latency is fully explained by container creation", "Incomplete — startup latency can also include control-path overhead, contention effects, and user code initialization", "Incorrect — cold starts happen only when triggers are misconfigured"], "D", "这句话不算完全错，但严重不完整。container creation 是其中一段；论文特别补上控制路径、并发争用和用户代码初始化这三个容易被忽略的部分。", "Abstract 提出三类 previously overlooked sources：control path latency、resource contention latency、user code initialization latency；Figure 6 展示完整阶段。", 2),

          allExplanations = false;
          paperFrame.dataset.page = "1";
          toggleAllExplanations.textContent = "展开解析";
          toggleAllExplanations.classList.remove("is-active");
          renderTabs();
          renderQuiz();
        });
        tabs.append(button);
      });
    }

    function renderQuiz() {
      const quiz = getActiveQuiz();
      const answers = state[quiz.id] || {};
      const answered = quiz.questions.filter((_, index) => answers[index]).length;
      const correct = quiz.questions.filter((question, index) => answers[index] === question.answer).length;

      quizTitle.textContent = quiz.title;
      quizMeta.textContent = `${answered}/${quiz.questions.length} 已答 · ${correct}/${quiz.questions.length} 正确`;
      paperTitle.textContent = quiz.paperTitle;
      paperMeta.textContent = quiz.paperMeta;
      setPaperPage(quiz, Number(paperFrame.dataset.page || 1), { force: false, announce: false });

      questionList.innerHTML = "";
      quiz.questions.forEach((question, index) => {
        if (onlyUnanswered && answers[index]) return;
        questionList.append(renderQuestion(quiz, question, index, answers[index]));
      });

      if (!questionList.children.length) {
        const empty = document.createElement("div");
        empty.className = "question-card";
        empty.innerHTML = '<div class="question-main"><p class="question-text">当前筛选下没有题目。</p><p class="pane-meta">关闭“只看未答”即可查看全部题目和解析。</p></div>';
        questionList.append(empty);
      }
    }

    function renderQuestion(quiz, question, index, selected) {
      const isAnswered = Boolean(selected);
      const isCorrect = selected === question.answer;
      const card = document.createElement("section");
      card.className = `question-card ${isAnswered ? (isCorrect ? "is-correct" : "is-wrong") : ""}`;

      const main = document.createElement("div");
      main.className = "question-main";

      const kicker = document.createElement("div");
      kicker.className = "question-kicker";
      const label = document.createElement("span");
      label.textContent = `Question ${index + 1}`;
      const status = document.createElement("span");
      status.className = `status-pill ${isAnswered ? (isCorrect ? "correct" : "wrong") : ""}`;
      status.textContent = isAnswered ? (isCorrect ? "已答对" : "需复盘") : "未作答";
      kicker.append(label, status);

      const title = document.createElement("p");
      title.className = "question-text";
      title.textContent = question.text;

      const fieldset = document.createElement("fieldset");
      fieldset.className = "options";
      fieldset.setAttribute("aria-label", `Question ${index + 1} options`);

      question.options.forEach((option, optionIndex) => {
        const letter = letters[optionIndex];
        const optionLabel = document.createElement("label");
        optionLabel.className = "option";
        if (selected && letter === question.answer) optionLabel.classList.add("correct-choice");
        if (selected && letter === selected && letter !== question.answer) optionLabel.classList.add("wrong-choice");

        const input = document.createElement("input");
        input.type = "radio";
        input.name = `${quiz.id}-${index}`;
        input.value = letter;
        input.checked = selected === letter;
        input.addEventListener("change", () => {
          state[quiz.id] = state[quiz.id] || {};
          state[quiz.id][index] = letter;
          saveState();
          renderQuiz();
          requestAnimationFrame(() => {
            const nextCard = document.querySelector(`[data-question-id="${quiz.id}-${index}"]`);
            if (nextCard) nextCard.scrollIntoView({ block: "nearest" });
          });
        });

        const text = document.createElement("span");
        text.className = "option-text";
        text.textContent = `${letter}. ${option}`;
        optionLabel.append(input, text);
        fieldset.append(optionLabel);
      });

      const actions = document.createElement("div");
      actions.className = "card-actions";
      const feedback = document.createElement("div");
      feedback.className = "feedback";
      feedback.textContent = selected ? `你的选择：${selected}` : "选择一个选项后会标记正确与否。";

      const actionGroup = document.createElement("div");
      actionGroup.className = "paper-actions";
      const reveal = document.createElement("button");
      reveal.type = "button";
      reveal.className = "answer-button";
      reveal.textContent = allExplanations ? "隐藏本题解析" : "查看解析";
      const locate = document.createElement("button");
      locate.type = "button";
      locate.className = "answer-button secondary";
      locate.textContent = `定位论文 p.${question.page}`;
      actionGroup.append(reveal, locate);
      actions.append(feedback, actionGroup);

      const explanation = document.createElement("div");
      explanation.className = `explanation ${allExplanations ? "is-open" : ""}`;
      explanation.innerHTML = `
        <p class="answer-line">正确答案：${question.answer}. ${question.options[letters.indexOf(question.answer)]}</p>
        <p>${question.explanation}</p>
        <div class="source-box"><strong>论文依据：</strong>${question.source}</div>
      `;

      reveal.addEventListener("click", () => {
        explanation.classList.toggle("is-open");
        reveal.textContent = explanation.classList.contains("is-open") ? "隐藏本题解析" : "查看解析";
        locatePaper(quiz, question.page);
      });
      locate.addEventListener("click", () => {
        locatePaper(quiz, question.page);
      });

      main.append(kicker, title, fieldset, actions);
      card.dataset.questionId = `${quiz.id}-${index}`;
      card.append(main, explanation);
      return card;
    }

    function getActiveQuiz() {
      return quizzes.find((quiz) => quiz.id === activeQuizId);
    }

    function locatePaper(quiz, page) {
      setPaperPage(quiz, page, { force: true, announce: true });
      if (window.matchMedia("(max-width: 980px)").matches) {
        paperPane.scrollIntoView({ behavior: "auto", block: "start" });
      }
    }

    function setPaperPage(quiz, page, options = {}) {
      const { force = false, announce = true } = options;
      const nextUrl = paperUrl(quiz, page, force ? `nav=${++paperNavigationId}` : "");
      const previousQuiz = paperFrame.dataset.quiz;
      paperFrame.dataset.page = String(page);
      paperFrame.dataset.quiz = quiz.id;

      if (announce) {
        paperMeta.textContent = `${quiz.paperMeta} · 已定位到 p.${page}`;
        paperHeader.classList.remove("is-located");
        void paperHeader.offsetWidth;
        paperHeader.classList.add("is-located");
      }

      if (force) {
        paperFrame.src = "about:blank";
        window.setTimeout(() => {
          paperFrame.src = nextUrl;
        }, 40);
        return;
      }

      if (previousQuiz !== quiz.id || !paperFrame.getAttribute("src")) {
        paperFrame.src = nextUrl;
      }
    }

    function paperUrl(quiz, page, query = "") {
      const queryString = query ? `?${query}` : "";
      return `${encodedPaperFile(quiz)}${queryString}#page=${page}&zoom=page-width`;
    }

    function encodedPaperFile(quiz) {
      return quiz.paperFile.split("/").map(encodeURIComponent).join("/");
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || {};
      } catch {
        return {};
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }
  </script>
</body>
</html>
